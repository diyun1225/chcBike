<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCPA 車況(BLE)</title>
</head>
<body>
  <h3>CCPA 車況(BLE)</h3>
  <button id="connectBtn">連線</button>
  <p id="status">尚未連線</p>
  <pre id="out">(尚未收到資料)</pre>

  <script src="ccpa_decode.js"></script>
  <script>
    const SERVICE = "0000cc01-c3d5-40b4-ab51-611746a316f3";
    const TX      = "0000cc03-c3d5-40b4-ab51-611746a316f3";

    const dec = new CcpaDecoder();
    const td = new TextDecoder();
    let buf = "";

    function show() {
      const s = dec.snapshot();
      document.getElementById("out").textContent =
        "車速     : " + (s.speedKph        ?? "--") + " kph\n" +
        "踏頻     : " + (s.cadenceRpm       ?? "--") + " rpm\n" +
        "扭力     : " + (s.torqueNm         ?? "--") + " Nm\n" +
        "馬達轉速 : " + (s.motorRpm         ?? "--") + " rpm\n" +
        "馬達溫度 : " + (s.motorTempC       ?? "--") + " C\n" +
        "助力模式 : " + (s.assistLevel      ?? "--") + "\n" +
        "電量     : " + (s.batterySocPct    ?? "--") + " %\n" +
        "電壓     : " + (s.batteryVoltageMv ?? "--") + " mV\n" +
        "電流     : " + (s.batteryCurrentMa ?? "--") + " mA\n" +
        "電池溫度 : " + s.batteryTempsC.map(x => x ?? "--").join(", ") + " C\n" +
        "後檔位   : " + (s.rearGear ? s.rearGear.index + "/" + s.rearGear.max : "--");
    }

    function onNotify(e) {
      buf += td.decode(e.target.value);
      let i;
      while ((i = buf.indexOf("\n")) >= 0) {
        const line = buf.slice(0, i).trim();
        buf = buf.slice(i + 1);
        if (line) { dec.feed(line); show(); }
      }
    }

    async function connect() {
      const st = document.getElementById("status");
      if (!navigator.bluetooth) { st.textContent = "此瀏覽器不支援藍牙(iPhone 請用 Bluefy)"; return; }
      try {
        st.textContent = "掃描中…請選 CCPA-Telemetry";
        const dev = await navigator.bluetooth.requestDevice({
          filters: [{ name: "CCPA-Telemetry" }], optionalServices: [SERVICE],
        });
        dev.addEventListener("gattserverdisconnected", () => st.textContent = "已斷線");
        const srv = await (await dev.gatt.connect()).getPrimaryService(SERVICE);
        const tx = await srv.getCharacteristic(TX);
        await tx.startNotifications();
        tx.addEventListener("characteristicvaluechanged", onNotify);
        st.textContent = "已連線";
      } catch (err) {
        st.textContent = "連線失敗:" + err.message;
      }
    }
    document.getElementById("connectBtn").addEventListener("click", connect);
  </script>
</body>
</html>
